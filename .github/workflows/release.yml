name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build-darwin:
    name: Build & package macOS .app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install Wails CLI
        run: go install -v github.com/wailsapp/wails/v3/cmd/wails3@latest
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Generate Wails TS bindings
        run: $(go env GOPATH)/bin/wails3 generate bindings -ts
      - name: Package .app (production, ad-hoc signed)
        run: $(go env GOPATH)/bin/wails3 task darwin:package
      - name: Determine tag
        id: tag
        run: |
          TAG=${{ github.ref_name }}
          if [ -z "$TAG" ] || [ "$TAG" = "main" ]; then TAG=${{ inputs.tag }}; fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - name: Zip the .app
        working-directory: bin
        run: |
          ARCH=$(uname -m)
          OUT="memre-${{ steps.tag.outputs.tag }}-darwin-${ARCH}.zip"
          ditto -c -k --keepParent --sequesterRsrc memre.app "$OUT"
          shasum -a 256 "$OUT" | tee "$OUT.sha256"
          ls -la "$OUT" "$OUT.sha256"
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            bin/memre-*.zip
            bin/memre-*.zip.sha256
