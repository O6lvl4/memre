name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Packages that don't transitively pull Wails GUI bits (GTK on Linux,
# Cocoa on macOS). composition imports the Wails application package
# which on Linux requires gtk+-3.0/webkit2gtk-4.1 system libs, so we
# scope the Linux job to the pure-domain layer instead of installing
# them just to run vet.
env:
  PURE_PKGS: >-
    ./internal/ai/...
    ./internal/card/...
    ./internal/deck/...
    ./internal/knowledge/...
    ./internal/settings/...
    ./internal/srs/...
    ./internal/platform/...

jobs:
  go:
    name: Go test + vet (pure layer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: go vet
        run: go vet ${{ env.PURE_PKGS }}
      - name: go test
        run: go test -race -count=1 -cover ${{ env.PURE_PKGS }}
      - name: go build
        run: go build ${{ env.PURE_PKGS }}

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install Wails CLI
        run: go install -v github.com/wailsapp/wails/v3/cmd/wails3@latest
      - name: Install npm deps
        working-directory: frontend
        run: npm ci
      - name: Generate Wails TS bindings
        run: $(go env GOPATH)/bin/wails3 generate bindings -ts
      - name: Type check + Vite build
        working-directory: frontend
        run: npm run build

  full-build:
    name: Full app build (darwin)
    runs-on: macos-latest
    needs: [go, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install Wails CLI
        run: go install -v github.com/wailsapp/wails/v3/cmd/wails3@latest
      - name: Install npm deps
        working-directory: frontend
        run: npm ci
      - name: Generate Wails TS bindings
        run: $(go env GOPATH)/bin/wails3 generate bindings -ts
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: go vet (full graph, including composition+wails on darwin)
        run: go vet ./...
      - name: Build Go binary
        run: go build -o memre .
      - name: Verify binary launches (3s smoke test)
        run: |
          ./memre &
          PID=$!
          sleep 3
          if kill -0 $PID 2>/dev/null; then
            echo "OK: app started"
            kill $PID || true
          else
            wait $PID
            echo "FAIL: app exited prematurely"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: memre-darwin-${{ github.sha }}
          path: memre
          if-no-files-found: error
          retention-days: 14
