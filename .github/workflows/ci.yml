name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go test + vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      # main.go embeds frontend/dist — that's CI-built only, so vet/build
      # are scoped to internal/... here. The full-build job below verifies
      # the embed compiles end to end on macOS.
      - name: go vet (internal only)
        run: go vet ./internal/...
      - name: go test
        run: go test -race -count=1 -cover ./internal/...
      - name: go build (internal only)
        run: go build ./internal/...

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install Wails CLI
        run: go install -v github.com/wailsapp/wails/v3/cmd/wails3@latest
      - name: Install npm deps
        working-directory: frontend
        run: npm ci
      - name: Generate Wails TS bindings
        # frontend/bindings is gitignored; regenerate before tsc/vite.
        run: $(go env GOPATH)/bin/wails3 generate bindings -ts
      - name: Type check + Vite build
        working-directory: frontend
        run: npm run build

  full-build:
    name: Full app build (darwin)
    runs-on: macos-latest
    needs: [go, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install Wails CLI
        run: go install -v github.com/wailsapp/wails/v3/cmd/wails3@latest
      - name: Install npm deps
        working-directory: frontend
        run: npm ci
      - name: Generate Wails TS bindings
        run: $(go env GOPATH)/bin/wails3 generate bindings -ts
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Build Go binary (now that frontend/dist exists for embed)
        run: go build -o memre .
      - name: Verify binary launches (3s smoke test)
        run: |
          ./memre &
          PID=$!
          sleep 3
          if kill -0 $PID 2>/dev/null; then
            echo "OK: app started"
            kill $PID || true
          else
            wait $PID
            echo "FAIL: app exited prematurely"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: memre-darwin-${{ github.sha }}
          path: memre
          if-no-files-found: error
          retention-days: 14
